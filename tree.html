<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#f5c242">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Arulicheyal">
<link rel="apple-touch-icon" href="/assets/icons/icon-152x152.png">
<title>Naalayiram Tree</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="/css/main.css?v=861">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Tamil:wght@400;700&display=swap" rel="stylesheet">

<style>
.container{
    max-width:600px;
    margin:30px auto;
    text-align:center;
}

.topbar{
    display:flex;
    justify-content:space-between;
    padding:10px 15px;
    font-size:16px;
}

.topbar div{
    cursor:pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<!-- TOPBAR -->
<div class="topbar" id="topbar" style="display:none;">
  <div id="backBtn">⬅ Back</div>
  <div id="homeBtn">🏠 Home</div>
</div>

<!-- APP -->
<div class="container" id="app"></div>

<!-- BOOK COVER -->
<div id="book-root" style="display:none;"></div>

<!-- INDEX PAGE -->
<div id="index-page" style="display:none;"></div>

<!-- MODAL ROOT -->
<div id="modalRoot"></div>
<div id="pathuModal" class="overlay" style="display:none;"></div>

<!-- FOOTER -->
<div id="footer"></div>

<!-- 🔥 LOAD HEADER / FOOTER IMMEDIATELY -->
<script src="js/layout.js"></script>
<script>
  loadLayout();
</script>

<!-- 🔥 MAIN APP ENTRY -->
<script type="module">
import { startTree } from './js/navigation.js?v=12';
import './js/voiceNavBoot.js';
  document.addEventListener("DOMContentLoaded", () => {

    // small delay ensures header buttons exist
    setTimeout(() => {

      // ✅ Skip startTree if voice navigation is pending
      // voiceNavBoot.js reads and clears "voiceNav" from sessionStorage —
      // but it runs on requestAnimationFrame (~16ms) before this 50ms timeout.
      // Use a flag set by voiceNavBoot to detect voice navigation.
      if (window._voiceNavActive) return;

      startTree();        // ✅ load canonical (THOUSAND)
    }, 50);

  });
</script>

<!-- cover.js loaded via import inside options.js -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('/service-worker.js')
        .then(function (reg) {
          console.log('[SW] Registered ✅ scope:', reg.scope);
        })
        .catch(function (err) {
          console.warn('[SW] Registration failed:', err);
        });
    });
  }
</script>
</body>
</html>
