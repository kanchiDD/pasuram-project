<!DOCTYPE html>
<html lang="ta">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>முன்னடி / பின்னடி Editor</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Tamil:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Noto Serif Tamil',serif;
background:#f5f5f5;
padding:25px;

}

.container{

max-width:850px;
margin:auto;
background:white;
border-radius:12px;
padding:25px;
box-shadow:0 0 20px rgba(0,0,0,.15);

}

h1{

text-align:center;
font-size:30px;
margin-bottom:25px;
color:#8B0000;

}

.row{

display:flex;
gap:10px;
align-items:center;
margin-bottom:20px;

}

label{

font-weight:bold;
font-size:20px;

}

input{

padding:10px;
font-size:20px;
border:1px solid #aaa;
border-radius:5px;
width:150px;

}

button{

padding:10px 25px;
font-size:18px;
cursor:pointer;
border:none;
border-radius:5px;
background:#0066cc;
color:white;

}

button:hover{

background:#004999;

}

textarea{

width:100%;
height:170px;
padding:12px;
font-size:24px;
font-family:'Noto Serif Tamil',serif;
border:1px solid #999;
border-radius:8px;
resize:vertical;
margin-top:8px;
margin-bottom:20px;

}

.buttons{

display:flex;
justify-content:space-between;
gap:10px;
margin-top:15px;

}

#status{

margin-top:20px;
font-size:18px;
font-weight:bold;
text-align:center;
color:green;

}

.footer{

margin-top:20px;
text-align:center;
font-size:16px;
color:#666;

}

@media(max-width:700px){

.row{

flex-direction:column;
align-items:flex-start;

}

input{

width:100%;

}

button{

width:100%;

}

.buttons{

flex-direction:column;

}

textarea{

font-size:22px;

}

}

</style>

</head>

<body>

<div class="container">

<h1>முன்னடி / பின்னடி Editor</h1>

<div class="row">

<label>Global No</label>

<input
type="number"
id="global_no"
placeholder="2675">

<button id="loadBtn">

Load

</button>

</div>

<label>

முன்னடி

</label>

<textarea
id="line1"></textarea>

<label>

பின்னடி

</label>

<textarea
id="line2"></textarea>

<div class="buttons">

<button id="prevBtn">

⬅ Previous

</button>

<button id="saveBtn">

💾 Save

</button>

<button id="nextBtn">

Next ➡

</button>

</div>

<div id="status">

Ready

</div>

<div class="footer">

Ctrl + S = Save

</div>

</div>

<script src="munnadi-editor.js"></script>


<script src="https://www.google.com/jsapi"></script>

<script>

google.load("elements", "1", {
    packages: "transliteration"
});

google.setOnLoadCallback(function(){

    var options = {

        sourceLanguage:
            google.elements.transliteration.LanguageCode.ENGLISH,

        destinationLanguage:
            [google.elements.transliteration.LanguageCode.TAMIL],

        transliterationEnabled: true

    };

    var control =
        new google.elements.transliteration.TransliterationControl(options);

    control.makeTransliteratable([
        "line1",
        "line2"
    ]);

});

</script>
<script src="https://cdn.jsdelivr.net/gh/thamizha/tamilvisai@master/dist/tamilvisai.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    // Enable phonetic Tamil typing
    if (window.TamilVisai) {

        TamilVisai.attach(document.getElementById("line1"), {
            layout: "phonetic"
        });

        TamilVisai.attach(document.getElementById("line2"), {
            layout: "phonetic"
        });

    }

});
</script>
</body>

</html>
