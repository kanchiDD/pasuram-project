<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f5c242">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Arulicheyal">
  <link rel="apple-touch-icon" href="/assets/icons/icon-152x152.png">
<title>Naalayiram - Full Book</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="/css/main.css?v=861">

</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<!-- OPTIONAL TOPBAR -->
<div class="topbar" id="topbar" style="display:none;">
  <div id="backBtn">⬅ Back</div>
  <div id="homeBtn">🏠 Home</div>
</div>

<!-- MAIN CONTENT -->
<div class="container" id="app">
  Loading book...
</div>

<!-- MODAL ROOT -->
<div id="modalRoot"></div>

<!-- FOOTER -->
<div id="footer"></div>

<!-- LAYOUT SYSTEM -->
<script src="js/layout.js"></script>
<script>
  loadLayout();
</script>

<!-- RENDERER -->
<script type="module">

import { renderFull4000 } from './js/fullThousandRenderer.js';

const params = new URLSearchParams(window.location.search);
const thousandId = params.get("thousand");
const view4000 = params.get("view");

fetch("https://cdnaalayiram-api.kanchitrust.workers.dev/api/full?view=4000")
  .then(res => res.json())
  .then(data => {

  console.log("API DATA:", data);

  let finalData = data;

  // ✅ FILTER ONLY SELECTED THOUSAND
  if (thousandId) {
    finalData = {
      ...data,
      thousands: (data.thousands || []).filter(t =>
        String(t.id) === String(thousandId)
      )
    };
  }

  // ✅ FULL 4000 → NO FILTER
  if (view4000 === "4000") {
    finalData = data;
  }

  const html = renderFull4000(finalData);

  document.getElementById("app").innerHTML = html;

})
  .catch(err => {
    console.error("API ERROR:", err);
    document.getElementById("app").innerHTML = "Error loading book";
  });

</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('/service-worker.js')
        .then(function (reg) {
          console.log('[SW] Registered ✅ scope:', reg.scope);
        })
        .catch(function (err) {
          console.warn('[SW] Registration failed:', err);
        });
    });
  }
</script>
</body>
</html>
